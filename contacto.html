<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="contacteTitle">Contacte - I Jornada d’Acollida Sociolingüística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="img/iconL.png">

</head>

<body class="font-sans">

    <div id="main-nav"></div>

    <!-- ====================== HERO ====================== -->
    <section class="bg-gradient-to-br from-purple-900 to-purple-700 text-white py-16 md:py-24 px-6">
        <div class="text-center max-w-2xl mx-auto">
            <div class="inline-flex items-center gap-2.5 bg-white/10 backdrop-blur-md border border-white/20 px-6 py-2.5 rounded-3xl">
                <i class="fa-solid fa-envelope text-purple-200 text-xl"></i>
                <span class="uppercase tracking-[2px] text-sm font-semibold text-white" data-key="contacteHeader">Contacte</span>
            </div>

            <h2 class="text-3xl md:text-5xl font-bold mt-6 mb-4 leading-tight" data-key="contacteHeroTitle">
            </h2>
            <p class="text-lg md:text-xl text-purple-100" data-key="contacteHeroDesc">
            
            </p>
        </div>
    </section>

    <!-- ====================== CONTENIDO PRINCIPAL ====================== -->
<div class="py-10 sm:py-12 md:py-20 bg-gradient-to-b from-gray-50 to-white">
  <div class="max-w-5xl mx-auto px-4 sm:px-5 md:px-6">

    <div class="bg-white rounded-2xl sm:rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
      <div class="grid md:grid-cols-5">

        <!-- IZQUIERDA -->
        <div class="md:col-span-3 p-6 sm:p-8 md:p-14 bg-gradient-to-br from-purple-50 to-white">
          
          <h3 class="text-xl sm:text-2xl font-semibold text-gray-900 mb-6 sm:mb-8" data-key="contacteCoordTitle"></h3>

          <div class="space-y-7 sm:space-y-10">

            <!-- EMAIL -->
            <div class="flex gap-4 sm:gap-5">
              <div class="w-10 h-10 sm:w-11 sm:h-11 bg-white shadow-sm rounded-xl sm:rounded-2xl flex items-center justify-center border border-purple-100 flex-shrink-0">
                <i class="fa-solid fa-envelope text-lg sm:text-2xl text-purple-600"></i>
              </div>
              <div class="min-w-0">
                <p class="uppercase text-[10px] sm:text-xs tracking-widest text-gray-500 mb-1" data-key="contacteEmailLabel"></p>
                <a href="mailto:formaciócoordinadora@gmail.com"
                   class="block text-base sm:text-lg md:text-xl font-medium text-purple-700 hover:text-purple-800 break-all">
                  formaciócoordinadora@gmail.com
                </a>
              </div>
            </div>

            <!-- TELÉFONO -->
            <div class="flex gap-4 sm:gap-5">
              <div class="w-10 h-10 sm:w-11 sm:h-11 bg-white shadow-sm rounded-xl sm:rounded-2xl flex items-center justify-center border border-purple-100 flex-shrink-0">
                <i class="fa-solid fa-phone text-lg sm:text-2xl text-purple-600"></i>
              </div>
              <div>
                <p class="uppercase text-[10px] sm:text-xs tracking-widest text-gray-500 mb-1" data-key="contactePhoneLabel"></p>
                <p class="text-base sm:text-lg md:text-xl font-medium text-gray-800" data-key="contactePhone">
                  604 541 305
                </p>
              </div>
            </div>

            <!-- LUGAR -->
            <div class="flex gap-4 sm:gap-5">
              <div class="w-10 h-10 sm:w-11 sm:h-11 bg-white shadow-sm rounded-xl sm:rounded-2xl flex items-center justify-center border border-purple-100 flex-shrink-0">
                <i class="fa-solid fa-map-marker-alt text-lg sm:text-2xl text-purple-600"></i>
              </div>
              <div>
                <p class="uppercase text-[10px] sm:text-xs tracking-widest text-gray-500 mb-1" data-key="contacteLocationLabel">Lloc</p>
                <p class="text-base sm:text-lg md:text-xl font-medium text-gray-800 leading-tight" data-key="contacteLocation"></p>
                <p class="text-sm sm:text-base text-gray-600 mt-1" data-key="contacteCity"></p>
              </div>
            </div>

            <!-- FECHA -->
            <div class="flex gap-4 sm:gap-5">
              <div class="w-10 h-10 sm:w-11 sm:h-11 bg-white shadow-sm rounded-xl sm:rounded-2xl flex items-center justify-center border border-purple-100 flex-shrink-0">
                <i class="fa-solid fa-calendar-day text-lg sm:text-2xl text-purple-600"></i>
              </div>
              <div>
                <p class="uppercase text-[10px] sm:text-xs tracking-widest text-gray-500 mb-1" data-key="contacteDateLabel"></p>
                <p class="text-base sm:text-lg md:text-xl font-medium text-gray-800" data-key="contacteDate"></p>
              </div>
            </div>

          </div>
        </div>

        <!-- DERECHA -->
        <div class="md:col-span-2 bg-white p-6 sm:p-8 md:p-14 flex flex-col justify-center border-t md:border-t-0 md:border-l border-gray-100">

          <div class="max-w-sm mx-auto md:mx-0">

            <div class="text-purple-600 mb-4 sm:mb-5 text-center md:text-left">
              <i class="fa-solid fa-message text-3xl sm:text-4xl"></i>
            </div>

            <h4 class="text-xl sm:text-2xl font-semibold text-gray-900 mb-4 sm:mb-5 text-center md:text-left" data-key="contacteMessageTitle"></h4>

            <p class="text-sm sm:text-base text-gray-600 leading-relaxed text-center md:text-left" data-key="contacteMessageDesc"></p>

            <div class="mt-8 sm:mt-10 pt-6 sm:pt-8 border-t border-gray-100">
              <p class="text-xs sm:text-sm text-gray-500 mb-3 sm:mb-4 text-center md:text-left" data-key="contacteEspecialment"></p>

              <ul class="space-y-2 sm:space-y-3 text-gray-600 text-sm">
                <li class="flex items-start gap-2 sm:gap-3" data-key="contacteItem1"></li>
                <li class="flex items-start gap-2 sm:gap-3" data-key="contacteItem2"></li>
                <li class="flex items-start gap-2 sm:gap-3" data-key="contacteItem3"></li>
              </ul>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- NOTA FINAL -->
    <div class="text-center mt-8 sm:mt-10 text-xs sm:text-sm text-gray-500 px-4" data-key="contacteNotaFinal">
      Coordinadora de la Llengua de Barcelona<br>
      Us esperem amb il·lusió!
    </div>

  </div>
</div>

    <div id="main-footer"></div>

    <script src="js/nav.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/script.js"></script>
    <script src="js/lang.js"></script>

</body>
</html>
