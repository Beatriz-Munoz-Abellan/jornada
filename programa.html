<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-key="pageTitle">Programa - I Jornada d’Acollida Sociolingüística</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="img/iconL.png">

</head>
<body class="font-sans">

  <div id="main-nav"></div>

  <section class="bg-gradient-to-r from-[#7a044b] to-[#9c0a5f] text-white py-24 p-7">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 id="prog-hero-title" class="text-5xl md:text-6xl font-bold mb-6" data-key="progHeroTitle"></h1>
      <p class="text-2xl text-purple-200 max-w-2xl mx-auto" data-key="heroDate"></p>
      
      <div class="mt-8 inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-6 py-3 rounded-full text-sm">

      <div class="mt-10">
        <a href="#"

          <i class="fa-solid fa-download text-xl"></i>
          <span data-key="downloadBtn"></span>
        </a>
      </div>
    </div>
  </section>

  <section id="programa" class="scollBoot py-20 bg-gray-50">
    <div class="max-w-screen-2xl mx-auto px-6">
      <div class="carousel-container relative px-2 md:px-12">
    
    <!-- Botón izquierda (oculto en móvil) -->
    <button id="btn-left" onclick="scrollCarousel(-1)" 
        class="carousel-btn left-btn  md:flex">
        <i class="fa-solid fa-chevron-left text-xl md:text-2xl"></i>
    </button>

    <div id="program-carousel" 
        class="program-carousel flex gap-4 md:gap-8 overflow-x-auto snap-x snap-mandatory scroll-smooth p-4 md:p-8">

        <!-- CARD -->
        <div onclick="showDetail(0)" id="card-0" class="program-card active">
            <div class="text-2xl md:text-4xl font-bold text-[#7a044b] mb-3">8:30 - 9:15</div>
            <h3 class="font-semibold text-lg md:text-xl" data-key="card0_Title"></h3>
            <p class="text-xs md:text-sm text-gray-500 mt-2" data-key="min45"></p>
        </div>
          <div onclick="showDetail(1)" id="card-1" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">9:30 - 9:45</div>
            <h3 class="font-semibold text-xl" data-key="card1_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min15"></p>
          </div>
          <div onclick="showDetail(2)" id="card-2" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">9:45 - 10:15</div>
            <h3 class="font-semibold text-xl" data-key="card2_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min30"></p>
          </div>
          <div onclick="showDetail(3)" id="card-3" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">10:30 - 11:30</div>
            <h3 class="font-semibold text-xl" data-key="card3_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min60"></p>
          </div>
          <div onclick="showDetail(4)" id="card-4" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">11:30 - 12:15</div>
            <h3 class="font-semibold text-xl" data-key="card4_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min45"></p>
          </div>
          <div onclick="showDetail(5)" id="card-5" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">12:30 - 13:30</div>
            <h3 class="font-semibold text-xl" data-key="card5_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min60"></p>
          </div>
          
          <div onclick="showDetail(6)" id="card-6" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">13:45 - 14:30</div>
            <h3 class="font-semibold text-xl" data-key="card6_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min75"></p>
          </div>
           <div onclick="showDetail(7)" id="card-7" class="program-card">
            <div class="text-4xl font-bold text-[#7a044b] mb-3">14:30 - 14:45</div>
            <h3 class="font-semibold text-xl" data-key="card7_Title"></h3>
            <p class="text-sm text-gray-500 mt-2" data-key="min15"></p>
          </div>
        </div>

        <button id="btn-right" onclick="scrollCarousel(1)" class="carousel-btn right-btn">
          <i class="fa-solid fa-chevron-right text-2xl"></i>
        </button>
      </div>

      <div id="program-detail" class="mt-20 bg-white rounded-3xl shadow-lg border border-gray-100 p-10 ">
        <h3 id="detail-title" class="text-3xl font-bold text-gray-800 mb-6"></h3>
        <div id="detail-text" class="text-gray-700 text-lg leading-relaxed">
            </div>
      </div>
    </div>
  </section>

  <div id="main-footer"></div>

  <script src="js/nav.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/script.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/cookis.js"></script>

</body>
</html>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const item = params.get('item');

    if (item !== null) {
      const index = parseInt(item);

      // Esperamos a que se cargue todo (nav, carousel, etc.)
      setTimeout(() => {
        // 1. Mostrar el detalle del programa seleccionado
        if (typeof showDetail === 'function') {
          showDetail(index);
        }

        // 2. Hacer scroll suave al contenedor del carrusel
        const carouselContainer = document.querySelector('.scollBoot');
        if (carouselContainer) {
          const headerHeight = document.getElementById('main-header')?.offsetHeight || 90;
          
          const elementPosition = carouselContainer.getBoundingClientRect().top + window.scrollY;
          const offsetPosition = elementPosition - headerHeight - 40; // margen superior

          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }

        // 3. Centrar la tarjeta seleccionada dentro del carrusel
        const selectedCard = document.getElementById(`card-${index}`);
        if (selectedCard) {
          setTimeout(() => {
            selectedCard.scrollIntoView({
              behavior: 'smooth',
              inline: 'center',
              block: 'nearest'
            });
          }, 900);
        }
      }, 650); // Tiempo suficiente para que el DOM esté listo
    } 
    else {
      // Si no hay parámetro, mostrar el primero por defecto
      setTimeout(() => {
        if (typeof showDetail === 'function') {
          showDetail(0);
        }
      }, 400);
    }
  });
</script>
